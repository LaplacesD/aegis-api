apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-api
  labels:
    app: aegis-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis-api
  template:
    metadata:
      labels:
        app: aegis-api
    spec:
      containers:
        - name: api
          image: ghcr.io/laplacesd/aegis-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aegis-db
                  key: database_url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aegis-secret
                  key: secret_key
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
