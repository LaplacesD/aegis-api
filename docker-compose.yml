version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://aegis:aegis@db:5432/aegis"
      SECRET_KEY: "change-me-in-production"
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "aegis.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  pgdata:
